name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Lint
        run: |
          flake8 services ui

      - name: Validate Python syntax
        run: |
          python -m py_compile services/api/main.py services/api/cache.py services/api/db.py services/api/ui_state.py
          python -m py_compile services/cdc-consumer/consumer.py services/cdc-consumer/config_store.py services/cdc-consumer/ui_state.py
          python -m py_compile ui/app.py services/load-generator/load_test.py

      - name: Validate Docker Compose
        run: docker compose config

      - name: Build Docker images
        run: |
          docker build -t cachefront-api ./services/api
          docker build -t cachefront-cdc-consumer ./services/cdc-consumer
          docker build -t cachefront-ui ./ui
          docker build -t cachefront-load-generator ./services/load-generator
