global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: cachefront-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - api:8000

  - job_name: cachefront-cdc-consumer
    metrics_path: /metrics
    static_configs:
      - targets:
          - cdc-consumer:9101
